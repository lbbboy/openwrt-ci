name: SSH Control Workflow

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection?'
        required: true
        default: 'false'
        type: choice
        options:
          - false
          - true
env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Shanghai

jobs:
  ssh-job:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      #- name: Backup workspace
      #  run: |
      #    mkdir -p /tmp/workspace_backup
      #    cp -r $GITHUB_WORKSPACE/* /tmp/workspace_backup

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1024
          remove-dotnet: 'true'

      #- name: Restore workspace
      #  run: |
      #    cp -r /tmp/workspace_backup/* $GITHUB_WORKSPACE/

      - name: SSH connection to Actions
        env:
          TELEGRAM_TOKEN : ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        uses: garypang13/debugger-action@master
        if: ${{ github.event.inputs.ssh == 'true' }}
    
      - name: Telegram notification
        if: env.TELEGRAM_TOKEN && ! contains(github.event.action, 'notg')
        continue-on-error: true
        run: |
         curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
         --data "text=🎉 OpenWrt ${{ env.VERSION }} ${{matrix.target}} 编译成功 😋  发布地址：https://github.com/${{ github.repository }}/releases ${{ env.COWURL }} ${{ env.WETRANS }} 🚀" \
         "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage"
