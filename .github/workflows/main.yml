name: SSH Control Workflow

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection?'
        required: true
        default: 'false'
        type: choice
        options:
          - false
          - true
env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Shanghai

jobs:
  ssh-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: SSH connection to Actions
        env:
          TELEGRAM_TOKEN : ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        uses: garypang13/debugger-action@master
        if: ${{ github.event.inputs.ssh == 'true' }}
    
      - name: Telegram notification
        if: env.TELEGRAM_TOKEN && ! contains(github.event.action, 'notg')
        continue-on-error: true
        run: |
          curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
          --data "text=🎉 OpenWrt ${{ env.VERSION }} ${{matrix.target}} 编译成功 😋  最新固件：https://github.com/${{ github.repository }}/releases/latest/download/${{matrix.target}}-factory.bin ${{ env.COWURL }} ${{ env.WETRANS }} 🚀" \
          "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage"
